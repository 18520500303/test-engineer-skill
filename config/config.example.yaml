# test-engineer 配置文件模板
# 首次安装时由 install.sh 生成，也可手动编辑

project:
  name: ""                            # 产品名称，如 "C3商用清洁机器人"
  preset: "example"                    # 对应 presets/ 下的目录名

user:
  name: ""                            # 用户姓名（用于报告署名）

# 以下配置已迁移到 preset.yaml（产品级配置）
# 包括：jira 项目映射、版本号正则、输出根目录等
# 详见 presets/{preset}/preset.yaml

confluence:
  host: ""                            # 如 "kb.cvte.com"

metersphere:
  enabled: false                      # 是否对接 MeterSphere
