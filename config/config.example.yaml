# test-engineer 配置文件模板
# 首次安装时由 install.sh 生成，也可手动编辑

project:
  name: ""                            # 产品名称，如 "C3商用清洁机器人"
  preset: "example"                    # 对应 presets/ 下的目录名

user:
  name: ""                            # 用户姓名（用于报告署名）
  jira_username: ""                   # Jira 用户名

# 以下字段目前放全局 config，后续多产品线时可迁移到 preset.yaml
jira:
  host: ""                            # 如 "jira.cvte.com"
  platform_project: ""                # 平台线 Jira 项目，如 "WRB"
  algorithm_project: ""               # 算法线 Jira 项目，如 "RBTPROJECT"
  version_field: "affectedVersion"    # 版本查询字段

output:
  root: "~/Desktop/workdata/测试用例"  # 文件输出根目录

confluence:
  host: ""                            # 如 "kb.cvte.com"

metersphere:
  enabled: false                      # 是否对接 MeterSphere
